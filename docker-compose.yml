services:
  front:
    build: ./front
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_DSN=postgresql://cockpit:cockpit@postgres:5432/cockpit
      - ANALYTICS_URL=http://analytics:8001
    depends_on:
      postgres:
        condition: service_healthy
      analytics:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cockpit -d cockpit"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  analytics:
    build: ./analytics
    ports:
      - "8001:8001"
    volumes:
      - lake_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pg_data:
  lake_data:
